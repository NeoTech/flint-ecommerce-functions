name = "lopc-api"
main = "src/platforms/cloudflare.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ---- Workers for Platforms --------------------------------------------------
# workers_dev = true  # set to false for production custom domain

# ---- D1 Database (placeholder — fill after provisioning) --------------------
# [[d1_databases]]
# binding = "DB"
# database_name = "lopc-prod"
# database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ---- KV Namespaces (placeholder — fill after provisioning) -----------------
# [[kv_namespaces]]
# binding = "KV"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ---- Rate Limiting (CF native — no extra service required) -----------------
# namespace_id is an arbitrary integer that scopes the counter namespace.
# Run `wrangler deploy` once to activate; no dashboard setup needed.
[[unsafe.bindings]]
name = "RATE_LIMITER_PUBLIC"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# ---- Environment variables --------------------------------------------------
# Secrets are set via: wrangler secret put SECRET_NAME
# Do NOT put sensitive values in this file.
[vars]
ENVIRONMENT = "development"
DB_SRC = "turso"
STRIPE_PUBLISHABLE_KEY = "pk_test_51T25yi5RwVcf7QBBEdT925fQkNh7Zz0YoIIBJCd1YcOw9NGhqymSlwpEdYW4HHqXeFV9SIfZz9Y6gZYgGlYLyPLb00ZnqmfGhP"

# ---- Production environment -------------------------------------------------
# Secrets (JWT_PRIVATE_KEY, JWT_PUBLIC_KEY, TURSO_DB_URL, TURSO_AUTH_TOKEN)
# are set via: wrangler secret put SECRET_NAME --env production
[env.production]
name = "lopc-api"
[env.production.vars]
ENVIRONMENT = "production"
STRIPE_PUBLISHABLE_KEY = "pk_test_51T25yi5RwVcf7QBBEdT925fQkNh7Zz0YoIIBJCd1YcOw9NGhqymSlwpEdYW4HHqXeFV9SIfZz9Y6gZYgGlYLyPLb00ZnqmfGhP"

# ---- Staging environment ----------------------------------------------------
[env.staging]
name = "lopc-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
